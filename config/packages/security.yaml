# config/packages/security.yaml
security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'
        App\Entity\User: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_(profiler|wdt)|css|images|js)/
            security: false

        main:
            lazy: true
            provider: app_user_provider

            # Configuration de l'authentification par formulaire
            form_login:
                login_path: app_login
                check_path: app_login
                enable_csrf: true
                username_parameter: email
                password_parameter: password
                default_target_path: app_trade_index
                always_use_default_target_path: false
                target_path_parameter: '_target_path'
                use_referer: false

            # Configuration de la déconnexion
            logout:
                path: app_logout
                target: app_login

            # Activation de l'authentification "remember me" (optionnel)
            # remember_me:
            #     secret: '%kernel.secret%'
            #     lifetime: 604800 # 1 semaine en secondes
            #     path: /
            #     always_remember_me: false

            # Désactivation de l'authentification HTTP basique
            http_basic: false

            # Désactivation de l'authentification par token
            stateless: false

    access_control:
        - { path: ^/login$, roles: PUBLIC_ACCESS }
        - { path: ^/register$, roles: PUBLIC_ACCESS }
        - { path: ^/$, roles: PUBLIC_ACCESS } # Page d'accueil publique
        - { path: ^/, roles: ROLE_USER }

    # Configuration des rôles hiérarchiques (optionnel)
    # role_hierarchy:
    #     ROLE_ADMIN: [ROLE_USER, ROLE_MODERATOR]
    #     ROLE_MODERATOR: [ROLE_USER]
